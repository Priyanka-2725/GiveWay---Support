version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: giveway_app
    restart: unless-stopped
    ports:
      - '9002:9002'
    environment:
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
