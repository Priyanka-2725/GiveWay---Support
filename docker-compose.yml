version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: giveway_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: giveway
      POSTGRES_PASSWORD: giveway_pass
      POSTGRES_DB: giveway
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: giveway_api
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - '4000:4000'
    environment:
      DATABASE_URL: "postgresql://giveway:giveway_pass@postgres:5432/giveway"
      CLIENT_URL: "http://localhost:9002"
      JWT_SECRET: "${JWT_SECRET}"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: giveway_app
    restart: unless-stopped
    ports:
      - '9002:9002'
    environment:
      GEMINI_API_KEY: "${GEMINI_API_KEY}"
      NEXT_PUBLIC_API_URL: "http://localhost:4000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
