version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: giveway-postgres
    environment:
      POSTGRES_USER: giveway
      POSTGRES_PASSWORD: giveway_pass
      POSTGRES_DB: giveway
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - giveway-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U giveway"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: giveway-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://giveway:giveway_pass@postgres:5432/giveway"
      JWT_SECRET: "dev-secret-key-change-in-production"
      PORT: 4000
      NODE_ENV: development
      CORS_ORIGIN: "http://localhost:3000"
    ports:
      - "4000:4000"
    volumes:
      - ./backend/src:/app/src
    networks:
      - giveway-network
    command: npm run dev

volumes:
  postgres_data:

networks:
  giveway-network:
    driver: bridge
